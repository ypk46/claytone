name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Creates the Version PR when changesets are present. Does not publish.
      - uses: changesets/action@v1
        if: "!startsWith(github.event.head_commit.message, 'Version Packages')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publishes only when the Version PR is merged (commit message starts with "Version Packages")
      - name: Publish to npm
        if: startsWith(github.event.head_commit.message, 'Version Packages')
        run: npm run release
